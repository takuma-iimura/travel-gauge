<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Journey Booster</title>
    <style>
        :root {
            --bg: #050508;
            --base-cyan: #00e5ff;
            --boost-red: #ff0040;
            --text-main: #f8fafc;
            --panel: #11111a;
            --panel-border: #222;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.boosting { background-color: #1a0205; }

        .container { width: 85%; max-width: 600px; text-align: center; z-index: 10; }

        /* メインゲージ */
        .gauge-outer {
            position: relative; width: 100%; height: 40vh;
            background: var(--panel); border-radius: 30px;
            border: 1px solid var(--panel-border); overflow: hidden;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
            margin-bottom: 1.5rem;
        }

        #bar {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: linear-gradient(0deg, #006070, var(--base-cyan));
            box-shadow: 0 0 40px var(--base-cyan);
            transition: height 1s ease, background 0.3s;
        }

        body.boosting #bar {
            background: linear-gradient(0deg, #800020, var(--boost-red));
            box-shadow: 0 0 60px var(--boost-red);
        }

        /* 数値表示 */
        .distance-display { margin-bottom: 0.5rem; }
        .dist-val { font-size: 5rem; font-weight: 900; letter-spacing: -3px; line-height: 1; }
        .dist-unit { font-size: 1.5rem; color: #475569; margin-left: 5px; }
        body.boosting .dist-val { color: var(--boost-red); text-shadow: 0 0 25px var(--boost-red); }

        /* ステータス・デバッグ情報 */
        .status-box { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #msg { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; color: #334155; }
        #debug { font-size: 0.7rem; color: #444; margin-top: 5px; font-family: monospace; }
        body.boosting #msg { color: var(--boost-red); }
        body.boosting #debug { color: #500; }

        /* UIボタン群 */
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .btn {
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            background: transparent; border: 1px solid var(--base-cyan); color: var(--base-cyan);
            border-radius: 10px; cursor: pointer; backdrop-filter: blur(10px);
        }
        
        /* 設定パネル（オーバーレイ） */
        #configPanel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(5px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 200;
        }
        .config-box {
            background: var(--panel); padding: 30px; border-radius: 15px;
            border: 1px solid var(--base-cyan); width: 80%; max-width: 400px;
        }
        .config-box h2 { margin: 0 0 20px 0; font-size: 1.2rem; color: var(--base-cyan); letter-spacing: 2px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .input-group input {
            width: 100%; padding: 10px; font-size: 1rem;
            background: #000; border: 1px solid #333; color: #fff;
            border-radius: 5px; box-sizing: border-box;
        }
        .config-btns { display: flex; gap: 10px; margin-top: 20px; }
        .config-btns button { flex: 1; padding: 12px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .btn-save { background: var(--base-cyan); color: #000; border: none; }
        .btn-cancel { background: transparent; color: #888; border: 1px solid #444; }

    </style>
</head>
<body>

    <div class="btn-group" id="initBtns">
        <button class="btn" onclick="initSystem()">SYSTEM START</button>
        <button class="btn" onclick="openConfig()" style="border-color:#444; color:#888;">⚙</button>
    </div>

    <div class="container" id="ui" style="display: none;">
        <div class="gauge-outer">
            <div id="bar"></div>
        </div>

        <div class="distance-display">
            <span id="distVal" class="dist-val">---.-</span><span class="dist-unit">km</span>
        </div>

        <div class="status-box">
            <div id="msg">SYSTEM INITIALIZING...</div>
            <div id="debug">Waiting for sensor data...</div>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="openConfig()" style="font-size: 0.9rem; padding: 10px 20px; border-color:#444; color:#888;">CONFIG</button>
        </div>
    </div>

    <div id="configPanel">
        <div class="config-box">
            <h2>TARGET COORDINATES</h2>
            <div class="input-group">
                <label>LATITUDE (緯度)</label>
                <input type="number" id="inLat" step="any">
            </div>
            <div class="input-group">
                <label>LONGITUDE (経度)</label>
                <input type="number" id="inLon" step="any">
            </div>
            <div class="config-btns">
                <button class="btn-cancel" onclick="closeConfig()">CANCEL</button>
                <button class="btn-save" onclick="saveConfig()">SAVE</button>
            </div>
        </div>
    </div>

    <script>
        // デフォルトの目的地（初回起動時用）
        let DEST = { lat: 36.42407437302163, lon: 136.6318145449978 }; 
        
        let totalDist = null;
        let targetBearing = null; 
        let currentHeading = null; 
        let isGpsActive = false;

        const elBar = document.getElementById('bar');
        const elDist = document.getElementById('distVal');
        const elMsg = document.getElementById('msg');
        const elDebug = document.getElementById('debug');
        const elUI = document.getElementById('ui');

        // 起動時にローカルストレージから設定を読み込む
        window.onload = () => {
            const savedLat = localStorage.getItem('targetLat');
            const savedLon = localStorage.getItem('targetLon');
            if (savedLat !== null && savedLon !== null) {
                DEST.lat = parseFloat(savedLat);
                DEST.lon = parseFloat(savedLon);
            }
        };

        // --- CONFIG UI制御 ---
        function openConfig() {
            document.getElementById('inLat').value = DEST.lat;
            document.getElementById('inLon').value = DEST.lon;
            document.getElementById('configPanel').style.display = 'flex';
        }

        function closeConfig() {
            document.getElementById('configPanel').style.display = 'none';
        }

        function saveConfig() {
            const lat = parseFloat(document.getElementById('inLat').value);
            const lon = parseFloat(document.getElementById('inLon').value);
            
            if (isNaN(lat) || isNaN(lon)) {
                alert("数値を正しく入力してください。");
                return;
            }

            // 変数更新とローカルストレージ保存
            DEST.lat = lat;
            DEST.lon = lon;
            localStorage.setItem('targetLat', lat);
            localStorage.setItem('targetLon', lon);
            
            // 基準距離をリセットして再計算させる
            totalDist = null; 
            
            closeConfig();
        }

        // --- メインシステム ---
        async function initSystem() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response !== 'granted') {
                    alert("コンパスの使用を許可してください。");
                    return;
                }
            }
            
            document.getElementById('initBtns').style.display = 'none';
            elUI.style.display = 'block';
            
            startTracking();
        }

        function startTracking() {
            navigator.geolocation.watchPosition(pos => {
                isGpsActive = true;
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                const remain = calculateDistance(lat, lon, DEST.lat, DEST.lon);
                if (totalDist === null) {
                    totalDist = remain;
                    if (totalDist === 0) totalDist = 0.001; 
                }

                targetBearing = calculateBearing(lat, lon, DEST.lat, DEST.lon);
                
                const progress = Math.max(0, Math.min(100, ((totalDist - remain) / totalDist) * 100));
                elBar.style.height = progress + '%';
                elDist.textContent = remain.toFixed(1);
                
                checkBoost();
            }, err => {
                isGpsActive = false;
                document.body.classList.remove('boosting');
                
                if (err.code === 1) elMsg.textContent = "DENIED: 許可されていません";
                else if (err.code === 2) elMsg.textContent = "SEARCHING GPS SIGNAL..."; 
                else if (err.code === 3) elMsg.textContent = "GPS TIMEOUT...";
                else elMsg.textContent = "GPS ERROR";
                
                elDebug.textContent = `ERR CODE: ${err.code}`;
            }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });

            window.addEventListener('deviceorientation', e => {
                let heading = e.webkitCompassHeading;
                if (heading === undefined) heading = 360 - e.alpha;
                currentHeading = heading;
                checkBoost();
            }, true);
        }

        function checkBoost() {
            if (!isGpsActive || targetBearing === null || currentHeading === null) return;

            const diff = Math.abs(currentHeading - targetBearing);
            const normalizedDiff = Math.min(diff, 360 - diff);

            elDebug.textContent = `TARGET: ${Math.round(targetBearing)}° / CURRENT: ${Math.round(currentHeading)}° (DIFF: ${Math.round(normalizedDiff)}°)`;

            // 車内でのブレを考慮し、判定を甘めの35度に設定
            if (normalizedDiff < 35) {
                document.body.classList.add('boosting');
                elMsg.textContent = ">>> LOCK ON: BOOSTING <<<";
            } else {
                document.body.classList.remove('boosting');
                elMsg.textContent = "TARGETING...";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
