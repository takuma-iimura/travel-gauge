<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Journey Progress</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --track-color: #1e1e24;
            --accent-color: #00e5ff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            font-size: 1.5rem;
            letter-spacing: 0.2rem;
            margin-bottom: 3rem;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        /* 進行状況の道 */
        .track-container {
            position: relative;
            width: 100%;
            height: 60px;
            background-color: var(--track-color);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .progress-bar {
            position: absolute;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #008299, var(--accent-color));
            box-shadow: 0 0 20px var(--accent-color);
            transition: width 0.5s ease-out;
            border-radius: 30px;
        }

        /* 車のアイコン（簡易表現） */
        .car-icon {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background-color: #fff;
            mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>') no-repeat center;
            -webkit-mask: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>') no-repeat center;
            margin-right: 10px;
        }

        /* 距離情報の数値 */
        .info {
            margin-top: 2rem;
            font-size: 1.2rem;
            color: #888;
        }

        .distance-val {
            font-size: 3rem;
            font-weight: bold;
            color: var(--text-color);
            display: block;
            margin-top: 0.5rem;
        }

        .debug-panel {
            position: fixed;
            bottom: 20px;
            font-size: 0.7rem;
            color: #444;
        }

        button {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ゆな・かりなのおうちまで</h1>
        
        <div class="track-container">
            <div id="progress" class="progress-bar">
                <div class="car-icon"></div>
            </div>
        </div>

        <div class="info">
            あと
            <span id="distance-text" class="distance-val">--.- km</span>
        </div>

        <button onclick="startTracking()">GPS連携を開始する</button>
    </div>

    <div id="debug" class="debug-panel">
        Waiting for GPS...
    </div>

    <script>
        // 設定: 目的地の座標（実家の座標を入力してください）
        // 例: 東京駅
        const DESTINATION = { lat: 36.41648693172963, lon: 136.63093526203568 }; 
        
        // 出発地の座標（計測開始時の座標を自動セット）
        let START_POS = null;
        let totalDistance = 0;

        const progressEl = document.getElementById('progress');
        const distanceEl = document.getElementById('distance-text');
        const debugEl = document.getElementById('debug');

        // 二点間の距離を計算 (Haversine公式)
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // 地球の半径 km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function updateUI(pos) {
            const currentLat = pos.coords.latitude;
            const currentLon = pos.coords.longitude;

            // 最初の位置を出発地として固定
            if (!START_POS) {
                START_POS = { lat: currentLat, lon: currentLon };
                totalDistance = getDistance(START_POS.lat, START_POS.lon, DESTINATION.lat, DESTINATION.lon);
            }

            const remainingDistance = getDistance(currentLat, currentLon, DESTINATION.lat, DESTINATION.lon);
            
            // 進捗率の計算 (0% 〜 100%)
            let progress = ((totalDistance - remainingDistance) / totalDistance) * 100;
            progress = Math.max(0, Math.min(100, progress)); // 範囲制限

            // UI更新
            progressEl.style.width = progress + '%';
            distanceEl.textContent = remainingDistance.toFixed(1) + ' km';
            
            debugEl.innerHTML = `Current: ${currentLat.toFixed(4)}, ${currentLon.toFixed(4)}<br>Total: ${totalDistance.toFixed(1)}km`;
        }

        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(updateUI, (err) => {
                    debugEl.textContent = "Error: " + err.message;
                }, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                });
                document.querySelector('button').style.display = 'none';
            } else {
                alert("GPSが利用できません");
            }
        }
    </script>
</body>
</html>
