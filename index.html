<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Journey Booster</title>
    <style>
        :root {
            --bg: #050507;
            --base-cyan: #00d2ff;
            --boost-red: #ff004c;
            --text: #e2e8f0;
        }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Avenir', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; transition: background 0.3s;
        }

        /* ブースト時の背景演出 */
        body.boosting { background: #1a0005; }

        .gauge-wrap {
            position: relative; width: 80%; height: 50vh;
            background: #111116; border-radius: 40px; overflow: hidden;
            border: 2px solid #222;
        }

        #bar {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: linear-gradient(0deg, #004e64, var(--base-cyan));
            box-shadow: 0 0 30px var(--base-cyan);
            transition: height 0.8s ease, background 0.3s;
        }

        /* ブースト時のゲージ色 */
        body.boosting #bar {
            background: linear-gradient(0deg, #66001d, var(--boost-red));
            box-shadow: 0 0 50px var(--boost-red);
        }

        .info { text-align: center; margin-top: 30px; }
        .dist { font-size: 4rem; font-weight: 900; letter-spacing: -2px; transition: color 0.3s; }
        body.boosting .dist { color: var(--boost-red); text-shadow: 0 0 20px var(--boost-red); }

        .status-msg { font-size: 1rem; color: #444; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        body.boosting .status-msg { color: var(--boost-red); content: "BOOSTING"; }

        #startBtn {
            padding: 20px 40px; font-size: 1.2rem; background: none;
            border: 1px solid var(--base-cyan); color: var(--base-cyan);
            border-radius: 10px; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <button id="startBtn" onclick="requestPermissions()">SYSTEM START</button>

    <div id="main-ui" style="display:none; width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="gauge-wrap">
            <div id="bar"></div>
        </div>
        <div class="info">
            <div id="distText" class="dist">---.- km</div>
            <div id="msg" class="status-msg">Searching target...</div>
        </div>
    </div>

    <script>
        const DEST = { lat: 35.6812, lon: 139.7671 }; // 目的地の座標
        let totalDist = null;

        // 方位角（Bearing）を計算する関数
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        async function requestPermissions() {
            // iOSのコンパス許可
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') return alert("センサーを許可してください");
            }

            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';

            startTracking();
        }

        function startTracking() {
            let currentBearing = 0;

            // GPS追跡
            navigator.geolocation.watchPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const remain = getDistance(lat, lon, DEST.lat, DEST.lon);
                if (totalDist === null) totalDist = remain;

                currentBearing = calculateBearing(lat, lon, DEST.lat, DEST.lon);
                
                const progress = Math.max(0, Math.min(100, ((totalDist - remain) / totalDist) * 100));
                document.getElementById('bar').style.height = progress + '%';
                document.getElementById('distText').textContent = remain.toFixed(1) + " km";
            }, null, { enableHighAccuracy: true });

            // コンパス追跡
            window.addEventListener('deviceorientationabsolute', e => {
                let heading = e.webkitCompassHeading || e.alpha;
                if (heading === undefined) return;

                // 目的地の方角とデバイスの向きの差を計算
                const diff = Math.abs(heading - currentBearing);
                const isTargeting = diff < 20 || diff > 340; // 誤差20度以内

                if (isTargeting) {
                    document.body.classList.add('boosting');
                    document.getElementById('msg').textContent = ">>> LOCK ON: BOOSTING <<<";
                } else {
                    document.body.classList.remove('boosting');
                    document.getElementById('msg').textContent = "Targeting...";
                }
            }, true);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI/180, dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
    </script>
</body>
</html>
