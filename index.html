<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Journey Booster</title>
    <style>
        :root {
            --bg: #050508;
            --base-cyan: #00e5ff;
            --boost-red: #ff0040;
            --text-main: #f8fafc;
            --panel: #11111a;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ブースト時の背景：深みのある赤 */
        body.boosting { background-color: #1a0205; }

        .container { width: 85%; max-width: 600px; text-align: center; z-index: 10; }

        /* メインゲージ */
        .gauge-outer {
            position: relative; width: 100%; height: 45vh;
            background: var(--panel); border-radius: 30px;
            border: 1px solid #222; overflow: hidden;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
            margin-bottom: 2rem;
        }

        #bar {
            position: absolute; bottom: 0; width: 100%; height: 0%;
            background: linear-gradient(0deg, #006070, var(--base-cyan));
            box-shadow: 0 0 40px var(--base-cyan);
            transition: height 1s ease, background 0.3s;
        }

        body.boosting #bar {
            background: linear-gradient(0deg, #800020, var(--boost-red));
            box-shadow: 0 0 60px var(--boost-red);
        }

        /* 数値表示 */
        .distance-display { margin-bottom: 0.5rem; }
        .dist-val { font-size: 5rem; font-weight: 900; letter-spacing: -3px; line-height: 1; }
        .dist-unit { font-size: 1.5rem; color: #475569; margin-left: 5px; }

        body.boosting .dist-val { color: var(--boost-red); text-shadow: 0 0 25px var(--boost-red); }

        /* ステータス・デバッグ情報 */
        .status-box { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #msg { font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; color: #334155; }
        #debug { font-size: 0.7rem; color: #222; margin-top: 5px; font-family: monospace; }

        body.boosting #msg { color: var(--boost-red); }
        body.boosting #debug { color: #500; }

        /* 開始ボタン */
        #startBtn {
            position: absolute; padding: 25px 50px; font-size: 1.5rem; font-weight: bold;
            background: transparent; border: 2px solid var(--base-cyan); color: var(--base-cyan);
            border-radius: 15px; cursor: pointer; backdrop-filter: blur(10px); z-index: 100;
        }
    </style>
</head>
<body>

    <button id="startBtn" onclick="initSystem()">SYSTEM START</button>

    <div class="container" id="ui" style="visibility: hidden;">
        <div class="gauge-outer">
            <div id="bar"></div>
        </div>

        <div class="distance-display">
            <span id="distVal" class="dist-val">---.-</span><span class="dist-unit">km</span>
        </div>

        <div class="status-box">
            <div id="msg">SYSTEM INITIALIZING...</div>
            <div id="debug">Waiting for sensor data...</div>
        </div>
    </div>

    <script>
        // --- 設定：目的地 ---
        const DEST = { lat: 36.42407437302163, lon: 136.6318145449978 }; 
        
        let totalDist = null;
        let targetBearing = null; 
        let currentHeading = null; 
        let isGpsActive = false; // GPS状態フラグ

        const elBar = document.getElementById('bar');
        const elDist = document.getElementById('distVal');
        const elMsg = document.getElementById('msg');
        const elDebug = document.getElementById('debug');
        const elUI = document.getElementById('ui');

        async function initSystem() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response !== 'granted') {
                    alert("コンパスの使用を許可してください。");
                    return;
                }
            }
            
            document.getElementById('startBtn').style.display = 'none';
            elUI.style.visibility = 'visible';
            
            startTracking();
        }

        function startTracking() {
            // 1. 位置情報の監視
            navigator.geolocation.watchPosition(pos => {
                isGpsActive = true;
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                const remain = calculateDistance(lat, lon, DEST.lat, DEST.lon);
                if (totalDist === null) {
                    totalDist = remain;
                    if (totalDist === 0) totalDist = 0.001; // 0除算防止
                }

                targetBearing = calculateBearing(lat, lon, DEST.lat, DEST.lon);
                
                const progress = Math.max(0, Math.min(100, ((totalDist - remain) / totalDist) * 100));
                elBar.style.height = progress + '%';
                elDist.textContent = remain.toFixed(1);
                
                checkBoost();
            }, err => {
                isGpsActive = false;
                document.body.classList.remove('boosting');
                
                // エラーコードによる詳細表示
                if (err.code === 1) {
                    elMsg.textContent = "DENIED: 許可されていません";
                } else if (err.code === 2) {
                    elMsg.textContent = "SEARCHING GPS SIGNAL..."; // 室内など
                } else if (err.code === 3) {
                    elMsg.textContent = "GPS TIMEOUT...";
                } else {
                    elMsg.textContent = "GPS ERROR";
                }
                elDebug.textContent = `ERR CODE: ${err.code} / ${err.message}`;
            }, { 
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });

            // 2. 方位センサーの監視
            window.addEventListener('deviceorientation', e => {
                let heading = e.webkitCompassHeading;
                if (heading === undefined) {
                    heading = 360 - e.alpha;
                }
                currentHeading = heading;
                checkBoost();
            }, true);
        }

        function checkBoost() {
            if (!isGpsActive) return; // GPS喪失時はブースト判定しない
            if (targetBearing === null || currentHeading === null) return;

            const diff = Math.abs(currentHeading - targetBearing);
            const normalizedDiff = Math.min(diff, 360 - diff);

            elDebug.textContent = `TARGET: ${Math.round(targetBearing)}° / CURRENT: ${Math.round(currentHeading)}° (DIFF: ${Math.round(normalizedDiff)}°)`;

            if (normalizedDiff < 25) {
                document.body.classList.add('boosting');
                elMsg.textContent = ">>> LOCK ON: BOOSTING <<<";
            } else {
                document.body.classList.remove('boosting');
                elMsg.textContent = "TARGETING...";
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
            const Δλ = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
